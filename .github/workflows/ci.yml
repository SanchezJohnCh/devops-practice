name: Python CI

on:
  push:
    branches:
      - feature/jobs

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "devops-pratice"
  BUILD_FOLDER: "build"

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "show build file"
        run: cat build/version.txt

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_FOLDER }}/

      - name: Show Variables
        run: |
          echo "Application: $APP_NAME"
          echo "Python: $PYTHON_VERSION"
          echo "Folder: $BUILD_FOLDER"

  
  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-     
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: downloaded_artifact/

      - name: Show downloaded artifact
        run: cat downloaded_artifact/version.txt



  Deploy:
    needs: Test
    if : github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying"
      

  
