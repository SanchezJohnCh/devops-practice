name: My First Pipeline

on:
  push:
    branches:
      - main

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: Say Hello
        run: echo "Hello DevOps!"
      
      - name: checout code
        uses: actions/checkout@v4

      - name: Current Directory
        run: pwd

      - name: Current User
        run: whoami

      - name: Operating System
        run: uname -a

      - name: Current Data
        run: date

      - name: Kernel Version
        run: uname -r

      - name: Show fies
        run: ls -al